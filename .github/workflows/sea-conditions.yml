# GalaiGO — build sea_conditions.json twice a day and commit it.
# Put this file in the galaigo-content repo at: .github/workflows/sea-conditions.yml
# Put the script at:                            scripts/fetch_sea_conditions.py
name: Update sea conditions
on:
  schedule:
    - cron: "0 2 * * *"    # 02:00 UTC (~05:00 Israel)
    - cron: "0 13 * * *"   # 13:00 UTC (~16:00 Israel)
  workflow_dispatch: {}     # allow manual "Run workflow"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch and build sea_conditions.json
        run: python3 scripts/fetch_sea_conditions.py sea_conditions.json
      - name: Commit if changed
        run: |
          if git diff --quiet -- sea_conditions.json; then
            echo "No change."
          else
            git config user.name  "galaigo-bot"
            git config user.email "bot@users.noreply.github.com"
            git add sea_conditions.json
            git commit -m "Update sea conditions ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
